baseURL = "http://szxzip.net/"
languageCode = "en-us"
title = "szxzip.net"
theme = "nojs"
timeZone = "Asia/Shanghai"

[menus]
  [[menus.main]]
    name = 'Home'
    pageRef = '/'
    weight = 1

  [[menus.main]]
    name = 'Minecraft'
    pageRef = '/minecraft'
    weight = 2

  [[menus.main]]
    name = 'Posts'
    pageRef = '/posts'
    weight = 3

[markup.goldmark.renderer]
  unsafe = true

[module]
  [[module.imports]]
    path = "github.com/kaushalmodi/hugo-atom-feed"

[outputs]
  home = ["HTML", "RSS", "ATOM"]
  # Optional:
  # section = ["HTML", "RSS", "ATOM"]
  # taxonomy = ["HTML", "RSS", "ATOM"]
