name: hugo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        uses: appleboy/ssh-action@master
        with:
          host: szxzip.net
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            rm -rf /var/www/html/*
            cd /root/szxzip.net
            git pull origin main
            podman run --name hugo \
              -v /root/szxzip.net:/data:Z \
              -w /data \
              ghcr.io/gohugoio/hugo:latest \
              --gc --cleanDestinationDir --logLevel debug --destination /tmp/hugo-public
            podman cp hugo:/tmp/hugo-public /root/szxzip.net/public
            podman rm hugo
            mv /root/szxzip.net/public/{.,}* /var/www/html/

