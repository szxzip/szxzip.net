name: hugo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        uses: appleboy/ssh-action@master
        with:
          host: szxzip.net
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            rm -rf /var/www/html/*
            mkdir -p /tmp/hugo-public
            cd /root/szxzip.net
            git pull origin main
            podman run --rm \
              -v /root/szxzip.net:/data:Z \
              -v /tmp/hugo-public:/data/public:Z \
              -w /data \
              ghcr.io/gohugoio/hugo:latest \
              --gc --cleanDestinationDir --logLevel debug
            mv /tmp/hugo-public/{.,}* /var/www/html/
            rm -rf /tmp/hugo-public
